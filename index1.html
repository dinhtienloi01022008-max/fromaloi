<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(270deg, #ff9a9e, #fad0c4, #ff4d6d);
    background-size: 600% 600%;
    animation: bgMove 10s ease infinite;
    font-family: Arial;
}

@keyframes bgMove {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

/* overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

.start-btn {
    padding: 20px 40px;
    font-size: 22px;
    border-radius: 40px;
    border: none;
    background: pink;
    cursor: pointer;
    box-shadow: 0 0 20px red;
}

/* nội dung */
.container {
    text-align: center;
    display: none;
}

/* ảnh */

    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid white;
    margin: 10px;
}
